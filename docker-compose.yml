services:
  # --- Frontend Vue.js ---
  progest-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pega a URL construída baseada no host da máquina e embute no SPA
        VITE_API_URL: "https://${APP_DOMAIN}/api"
    image: progest-web:latest
    networks:
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Configuração Unificada de Domínio Seguro de Produção
      - "traefik.http.routers.progest-web.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.progest-web.entrypoints=websecure"
      - "traefik.http.routers.progest-web.tls=true"
      - "traefik.http.routers.progest-web.tls.certresolver=myresolver"
      - "traefik.http.services.progest-web.loadbalancer.server.port=80"

# --- Networks ---
networks:
  traefik-public:
    external: true
    name: traefik-public
